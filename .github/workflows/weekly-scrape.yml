name: Weekly Dealer Scrape

on:
  schedule:
    # Every Sunday at 6am UTC
    - cron: '0 6 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - brand: rcmowers
            needs_browser: false
          - brand: stihl
            needs_browser: false
          - brand: dewalt
            needs_browser: false
          - brand: traeger
            needs_browser: false
          - brand: gozney
            needs_browser: false
          - brand: weber
            needs_browser: false
          # Brands that need puppeteer (headless browser):
          # - brand: acehardware
          #   needs_browser: true
    env:
      PUPPETEER_SKIP_DOWNLOAD: ${{ matrix.needs_browser == false && 'true' || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - name: Install browser system dependencies
        if: matrix.needs_browser
        run: npx puppeteer browsers install chrome --install-deps

      - name: Run scraper for ${{ matrix.brand }}
        run: node scrape.js ${{ matrix.brand }}

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: node upload.js ${{ matrix.brand }}

      - name: Upload artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.brand }}-dealers
          path: output/*.csv
          retention-days: 90
